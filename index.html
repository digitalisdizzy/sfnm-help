    <title>Site Unavailable</title>
</head>
<body>

    <header>
        <p id="headerP"></p>
    </header>

    <main>
        <h1 id="heading">Site Unavailable</h1>
        <h2 id="subheading"></h2>
        <p id="moreinfo"></p>
    </main>

    <footer>
        <p id="footerP"></p>
    </footer>

    <script>
        function addDefaults(received){
            const toReturn = {...received}
            if(!received.siteName){
                if(document.domain == "127.0.0.1"){
                    toReturn.siteName = "localhost"
                } else {
                    toReturn.siteName = document.domain
                }
            }
            if(!received.headerText){
                toReturn.headerText = toReturn.siteName
            }
            if(!received.footerText){
                toReturn.footerText = `© ${new Date().getFullYear()}`
            }
            if(!received.heading){
                toReturn.heading = "Site Unavailable"
            }
            if(!received.subheading){
                toReturn.subheading = `${toReturn.siteName} is currently unavailable`
            }
            if(!received.moreInfo){
                toReturn.moreInfo = ""
            }
            return toReturn
        }

        fetch("config.json").then(async r => {
            let values = {}
            if(r.ok){
                values = await r.json()
            }
            values = addDefaults(values)
            
            document.getElementById("headerP").innerHTML = values.headerText
            document.getElementById("heading").innerHTML = values.heading
            document.getElementById("subheading").innerHTML = values.subheading
            document.getElementById("moreinfo").innerHTML = values.moreInfo
            document.getElementById("footerP").innerHTML = values.footerText
        })
    </script>
</body>
